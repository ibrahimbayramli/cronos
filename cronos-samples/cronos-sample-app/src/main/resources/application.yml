spring:
  application:
    name: cronos-sample-app
  config:
    import: optional:classpath:application-cronos.properties

server:
  port: 8080

logging:
  level:
    dev.cronos: INFO

# Override demo job schedules in your own application.yml or via env/CLI:
#   sample.jobs.heartbeat-cron: "0 0 * * * *"
#   sample.jobs.cleanup-fixed-rate: 120000
sample:
  jobs:
    heartbeat-cron: "0 */5 * * * *"
    cleanup-fixed-rate: 60000
