spring:
  application:
    name: cronos-sample-app
  config:
    import: optional:classpath:application-cronos.properties

server:
  port: 8080

logging:
  level:
    dev.cronos: INFO

# Demo job schedules — override as needed without code changes
sample:
  jobs:
    heartbeat-cron: "0 */5 * * * *"   # every 5 minutes
    cleanup-fixed-rate: 60s
